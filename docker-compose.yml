version: '3.8'

services:
  inspectionvision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inspectionvision
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./static/uploads:/app/static/uploads
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
version: '3.8'

services:
  inspectionvision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inspectionvision
  
    ports:
      - "8000:8000"
    volumes:
      # Mount outputs directory to persist results
      - ./outputs:/app/outputs
      # Mount uploads directory to persist uploaded files
      - ./static/uploads:/app/static/uploads
      # Optional: Mount test data (uncomment if needed)
      # - ./Test images:/app/Test images:ro
      # - ./Test videos:/app/Test videos:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (adjust based on your hardware)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

networks:
  default:
    name: inspectionvision-network
